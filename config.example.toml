[server]

# Transport protocol for MCP communication.
#   "http"  - Recommended. Runs a standalone HTTP server that MCP clients
#             connect to via URL (e.g. http://127.0.0.1:8080/mcp).
#   "sse"   - Server-Sent Events transport. Runs an HTTP server that MCP clients
#             connect to via URL (e.g. http://127.0.0.1:8080/sse). Use this for
#             clients that do not support Streamable HTTP session management.
#   "stdio" - Communicates over stdin/stdout. Used when an MCP client
#             launches the server as a subprocess (e.g. Claude Desktop local mode).
transport = "http"

# IP address to bind the HTTP server to.
#   "127.0.0.1" - Listen on localhost only (default, recommended for security).
#   "0.0.0.0"   - Listen on all interfaces (use when clients connect from other hosts).
host = "127.0.0.1"

# TCP port for the HTTP server (1–65535).
port = 8080

# Logging level: "debug", "info", "warning", "error", "critical".
#   "debug" logs every API call and its parameters - useful for troubleshooting.
#   "info"  logs connections, disconnections, and startup info (default).
log_level = "info"

# Path to a log file. When set, logs are written to this file INSTEAD of stderr.
# The parent directory must exist (the install script creates /var/log/zabbix-mcp/).
# The default path below has logrotate configured by the install script (daily, 30 days).
log_file = "/var/log/zabbix-mcp/server.log"

# Bearer token for MCP server authentication (OPTIONAL).
# This protects the MCP server itself — MCP clients must send this token
# in the Authorization header: Authorization: Bearer <token>
# NOTE: This is NOT the Zabbix API token. The Zabbix API token is configured
# below in the [zabbix.*] section and is REQUIRED.
# When not set, the MCP server accepts unauthenticated connections
# (safe when bound to 127.0.0.1, must be set when using 0.0.0.0).
#
# Only one auth_token can be set — all MCP clients share the same token.
# Uncomment ONE of the options below:
#
# Option 1 — For local (non-Docker) installations — token directly in config:
# auth_token = "your-secret-token-here"
#
# Option 2 — For Docker — just uncomment this line (do not change the value here,
#             set the actual token in your .env file):
# auth_token = "${MCP_AUTH_TOKEN}"

# Maximum number of Zabbix API calls per minute per client (sliding window).
# Each MCP client session gets its own independent counter.
# Protects the Zabbix server from being overwhelmed by rapid AI requests.
# Set to 0 to disable rate limiting.
# Default: 300.
rate_limit = 300

# Compact output mode for get methods (default: true).
# When enabled, get methods return only key fields (e.g. hostid, name, status)
# instead of all fields, reducing token usage in LLM conversations.
# The LLM can always override this by explicitly passing output = "extend"
# or specific field names in any get call.
# Set to false to always return all fields (pre-1.13 behavior).
compact_output = true

# Maximum characters per tool response before truncation. Default 50000
# (roughly 12k tokens), minimum 5000. Increase for workflows that export
# large Zabbix templates via configuration_export (a typical built-in
# template is 30-100KB of YAML). Higher values use more LLM context per
# response. Examples: 200000 for medium templates, 500000 for large
# built-in templates.
# response_max_chars = 50000

# ---------------------------------------------------------------------------
# PDF Reporting (optional - requires: pip install zabbix-mcp-server[reporting])
# ---------------------------------------------------------------------------
# The report_generate tool creates professional PDF reports from Zabbix data.
# Install optional dependencies to enable: pip install weasyprint jinja2
# Or: pip install zabbix-mcp-server[reporting]

# Path to company logo image (PNG, JPG, or SVG). Embedded in report header.
# report_logo = "/etc/zabbix-mcp/logo.png"

# Company name shown in report title (e.g. "ACME Corp / Availability Report").
# report_company = ""

# Subtitle shown in the report header (default: "IT Monitoring Service").
# report_subtitle = "IT Monitoring Service"

# ---------------------------------------------------------------------------
# Custom Report Templates (BETA)
# ---------------------------------------------------------------------------
# In addition to the 4 built-in templates (availability, capacity_host,
# capacity_network, backup), you can register your own HTML/Jinja2 templates.
# Custom HTML files live in /etc/zabbix-mcp/templates/ (created by the
# installer). The admin portal includes a visual editor that writes both the
# file and the [report_templates.*] section automatically.
#
# This is currently a beta / first concept - feedback welcome at
# https://github.com/initMAX/zabbix-mcp-server/issues
#
# See docs/REPORTING.md for an authoring guide and the list of Jinja2
# context variables exposed by each report type.
#
# [report_templates.my_custom_report]
# display_name = "My Custom Report"
# description  = "Short description shown in the admin portal"
# template_file = "/etc/zabbix-mcp/templates/my_custom_report.html"

# ---------------------------------------------------------------------------
# TLS / HTTPS
# ---------------------------------------------------------------------------
# Enable native TLS by providing paths to a certificate and private key.
# When set, the server listens on HTTPS instead of HTTP.
# Alternative: use a TLS-terminating reverse proxy (nginx, Caddy).
#
# tls_cert_file = "/etc/zabbix-mcp/tls/server.crt"
# tls_key_file = "/etc/zabbix-mcp/tls/server.key"

# ---------------------------------------------------------------------------
# CORS (Cross-Origin Resource Sharing)
# ---------------------------------------------------------------------------
# List of allowed origins for CORS requests. When not set, CORS headers are
# not sent and cross-origin browser requests are blocked (secure default).
# Use ["*"] to allow all origins (NOT recommended for production).
#
# cors_origins = ["https://your-app.example.com"]
# cors_origins = ["https://app1.example.com", "https://app2.example.com"]
# cors_origins = ["*"]  # allow all — only for development!

# ---------------------------------------------------------------------------
# IP allowlist
# ---------------------------------------------------------------------------
# Restrict access to specific IP addresses or CIDR ranges.
# When not set, all IPs are allowed (access is controlled only by auth_token).
# Supports individual IPs and CIDR notation.
#
# allowed_hosts = ["127.0.0.1", "10.0.0.0/24", "192.168.1.100"]

# ---------------------------------------------------------------------------
# File import directories
# ---------------------------------------------------------------------------
# The source_file feature allows configuration.import to read template files
# from disk instead of requiring inline content. For security, this feature
# is DISABLED by default. Set allowed directories to enable it.
#
# allowed_import_dirs = ["/etc/zabbix-mcp/imports", "/opt/zabbix-templates"]

# ---------------------------------------------------------------------------
# Permission hardening
# ---------------------------------------------------------------------------
# The tools filter and read_only flag can be combined to achieve fine-grained
# write permissions. For example, to allow only monitoring reads and
# maintenance writes:
#
#   tools = ["monitoring", "maintenance"]
#   read_only = false   # on the server section below
#
# This registers all monitoring tools (host_get, problem_get, ...) plus
# maintenance tools (maintenance_create, maintenance_update, ...), while
# tools like host_create, host_delete, or template_delete are never exposed
# to the MCP client.
#
# Note: the tools filter is prefix-based, so "host" registers ALL host_*
# tools (get, create, update, delete) together. The read_only flag then
# controls which of those are allowed based on the operation type:
#
#   Read operations (allowed when read_only = true):
#     *_get, *_export, *_checkauthentication
#
#   Write operations (blocked when read_only = true):
#     *_create, *_update, *_delete, *_massadd, *_massremove, *_massupdate,
#     *_import, *_execute, *_acknowledge, *_push, *_clear, *_propagate,
#     *_generate, *_provision, *_unblock, *_resettotp, *_replacehostinterfaces
#
# For method-level control beyond this, use Zabbix User Roles
# (Administration > User roles > API methods) to define an allow/deny list
# on the API token's user. Zabbix will reject unauthorized calls regardless
# of MCP server settings.
#
# Recommended approach for production: combine all three layers:
#   1. tools     - limit registered tools to relevant prefixes (reduces noise)
#   2. read_only - block all writes on servers that should be read-only
#   3. Zabbix User Roles - enforce method-level access control at the API level

# Filter which tool groups are exposed via MCP.
# When not set or commented out, all ~225 tools are registered (default).
# This is useful when your LLM has a tool limit (e.g. OpenAI max 128 tools).
#
# Use category names to include entire groups at once, individual tool prefixes,
# or mix both. The "health_check" and "zabbix_raw_api_call" tools are always
# registered regardless of this setting.
#
# Default (all tools):
# tools = ["monitoring", "data_collection", "alerts", "users", "administration"]
#
# Categories and their tools:
#
#   "monitoring" (82 tools):
#     dcheck_get
#     dhost_get
#     discoveryrule_create, discoveryrule_delete, discoveryrule_get, discoveryrule_update
#     discoveryruleprototype_create, discoveryruleprototype_delete, discoveryruleprototype_get, discoveryruleprototype_update
#     drule_create, drule_delete, drule_get, drule_update
#     dservice_get
#     event_acknowledge, event_get
#     graph_create, graph_delete, graph_get, graph_update
#     graphitem_get
#     graphprototype_create, graphprototype_delete, graphprototype_get, graphprototype_update
#     history_clear, history_get, history_push
#     host_create, host_delete, host_get, host_massadd, host_massremove, host_massupdate, host_update
#     hostgroup_create, hostgroup_delete, hostgroup_get, hostgroup_massadd, hostgroup_massremove, hostgroup_massupdate, hostgroup_propagate, hostgroup_update
#     hostinterface_create, hostinterface_delete, hostinterface_get, hostinterface_massadd, hostinterface_massremove, hostinterface_replacehostinterfaces, hostinterface_update
#     hostprototype_create, hostprototype_delete, hostprototype_get, hostprototype_update
#     httptest_create, httptest_delete, httptest_get, httptest_update
#     item_create, item_delete, item_get, item_update
#     itemprototype_create, itemprototype_delete, itemprototype_get, itemprototype_update
#     problem_get
#     sla_create, sla_delete, sla_get, sla_getsli, sla_update
#     trend_get
#     trigger_create, trigger_delete, trigger_get, trigger_update
#     triggerprototype_create, triggerprototype_delete, triggerprototype_get, triggerprototype_update
#
#   "data_collection" (27 tools):
#     dashboard_create, dashboard_delete, dashboard_get, dashboard_update
#     template_create, template_delete, template_get, template_massadd, template_massremove, template_massupdate, template_update
#     templatedashboard_create, templatedashboard_delete, templatedashboard_get, templatedashboard_update
#     templategroup_create, templategroup_delete, templategroup_get, templategroup_massadd, templategroup_massremove, templategroup_massupdate, templategroup_propagate, templategroup_update
#     valuemap_create, valuemap_delete, valuemap_get, valuemap_update
#
#   "alerts" (16 tools):
#     action_create, action_delete, action_get, action_update
#     alert_get
#     mediatype_create, mediatype_delete, mediatype_get, mediatype_update
#     script_create, script_delete, script_execute, script_get, script_getscriptsbyevents, script_getscriptsbyhosts, script_update
#
#   "users" (39 tools):
#     mfa_create, mfa_delete, mfa_get, mfa_update
#     role_create, role_delete, role_get, role_update
#     token_create, token_delete, token_generate, token_get, token_update
#     user_checkauthentication, user_create, user_delete, user_get, user_login, user_logout, user_provision, user_resettotp, user_unblock, user_update
#     userdirectory_create, userdirectory_delete, userdirectory_get, userdirectory_test, userdirectory_update
#     usergroup_create, usergroup_delete, usergroup_get, usergroup_update
#     usermacro_create, usermacro_createglobal, usermacro_delete, usermacro_deleteglobal, usermacro_get, usermacro_update, usermacro_updateglobal
#
#   "administration" (59 tools):
#     auditlog_get
#     authentication_get, authentication_update
#     autoregistration_get, autoregistration_update
#     configuration_export, configuration_import, configuration_importcompare
#     connector_create, connector_delete, connector_get, connector_update
#     correlation_create, correlation_delete, correlation_get, correlation_update
#     hanode_get
#     housekeeping_get, housekeeping_update
#     iconmap_create, iconmap_delete, iconmap_get, iconmap_update
#     image_create, image_delete, image_get, image_update
#     maintenance_create, maintenance_delete, maintenance_get, maintenance_update
#     map_create, map_delete, map_get, map_update
#     module_create, module_delete, module_get, module_update
#     proxy_create, proxy_delete, proxy_get, proxy_update
#     proxygroup_create, proxygroup_delete, proxygroup_get, proxygroup_update
#     regexp_create, regexp_delete, regexp_get, regexp_update
#     report_create, report_delete, report_get, report_update
#     settings_get, settings_update
#     task_create, task_get
#
# Examples:
#   tools = ["monitoring"]
#   tools = ["monitoring", "data_collection", "alerts"]
#   tools = ["host", "problem", "trigger", "template"]
#   tools = ["monitoring", "template", "action", "dashboard"]

# Exclude specific tool groups from registration (denylist).
# Uses the same category names and prefixes as the "tools" option above.
# Applied after the allowlist — if both are set, a tool must pass both filters.
# When not set, no tools are excluded (default).
#
# Examples:
#   disabled_tools = ["users", "administration"]
#   disabled_tools = ["script", "configuration"]

# ---------------------------------------------------------------------------
# Admin Portal
# ---------------------------------------------------------------------------
# Web-based administration portal for managing MCP tokens, users, report
# templates, and server settings. Runs on a separate port.

[admin]
# Enable/disable the admin portal. When disabled, MCP server works normally
# but the admin UI is not accessible. All config data remains in this file.
enabled = true

# Admin portal port (separate from MCP server for independent firewalling).
# Shares host, TLS certificates, and CORS settings from [server] section.
port = 9090

# Admin users — create via the admin portal or manually here.
# Password hashes are generated with scrypt. To set a password manually:
#   python3 -c "import hashlib,os; s=os.urandom(16); print(f'scrypt:16384:8:1${s.hex()}${hashlib.scrypt(input(\"Password: \").encode(),salt=s,n=16384,r=8,p=1,dklen=32).hex()}')"
# The installer generates the initial admin password automatically.

# [admin.users.admin]
# password_hash = "scrypt:16384:8:1$salt$hash"
# role = "admin"     # admin | operator | viewer

# ---------------------------------------------------------------------------
# MCP Tokens (multi-token authentication)
# ---------------------------------------------------------------------------
# Define multiple API tokens for MCP clients. Each token can have different
# scopes, IP restrictions, and read-only settings. Tokens are managed via
# the admin portal or manually in this file.
#
# When no [tokens.*] sections exist, the legacy auth_token above is used.
# When [tokens.*] sections exist, they take precedence over auth_token.
#
# Generate a token using the installer:
#   sudo ./deploy/install.sh generate-token <name>
#
# Or generate manually (no install required):
#   python3 -c "import secrets,hashlib; t='zmcp_'+secrets.token_hex(32); print(f'Token: {t}\nHash:  sha256:{hashlib.sha256(t.encode()).hexdigest()}')"
#   Then paste the hash below and use the token in your MCP client config:
#   "headers": {"Authorization": "Bearer zmcp_..."}

# [tokens.example]
# name = "My MCP Client"
# token_hash = "sha256:<hex>"      # SHA-256 hash of the bearer token
# scopes = ["*"]                   # Tool groups: monitoring, data_collection, alerts, users, administration, or * for all
# read_only = true
# allowed_ips = ["10.0.0.0/24"]   # Optional IP/CIDR whitelist
# allowed_servers = ["*"]          # Optional: restrict to specific Zabbix servers
# expires_at = "2026-12-31T23:59:59Z"  # Optional expiry (ISO 8601)

# ---------------------------------------------------------------------------
# Zabbix servers
# ---------------------------------------------------------------------------
# Define one or more Zabbix servers below. Each section name under [zabbix.*]
# becomes the server identifier used in the "server" parameter of every tool.
#
# The FIRST server defined here is used as the default when no "server"
# parameter is specified in a tool call.

[zabbix.production]

# Full URL of the Zabbix frontend (must start with http:// or https://).
# The /api_jsonrpc.php path is added automatically by the API client.
url = "https://zabbix.example.com"

# Zabbix API token for authentication (REQUIRED).
# This authenticates the MCP server to Zabbix — NOT the same as auth_token above.
# Create one in Zabbix: User settings > API tokens > Create API token.
# Tokens inherit the permissions of the Zabbix user they belong to.
api_token = "your-api-token-here"

# You can reference an environment variable instead of storing the token in plain text:
# api_token = "${ZABBIX_PROD_TOKEN}"

# Read-only mode. When true, all write operations (create, update, delete, execute)
# are blocked for this server. Set to false to allow modifications.
# Default: true (safe by default).
read_only = true

# TLS certificate verification. Set to false only for self-signed certificates
# or test environments. Should always be true in production.
# Default: true.
verify_ssl = true

# Skip Zabbix API version compatibility check. Enable this when connecting
# to a Zabbix version newer than what zabbix-utils has been tested with.
# Default: false.
# skip_version_check = false

# ---------------------------------------------------------------------------
# Example: additional server
# ---------------------------------------------------------------------------
# Uncomment and configure to add a second Zabbix instance.
# Tools can target it by passing server = "staging".
#
# [zabbix.staging]
# url = "https://zabbix-staging.example.com"
# api_token = "${ZABBIX_STAGING_TOKEN}"
# read_only = false
# verify_ssl = false
# skip_version_check = false
