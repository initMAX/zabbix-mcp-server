<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — Zabbix MCP Admin</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="login-page">
        <div class="theme-switcher-login">
            <button class="theme-btn" onclick="setTheme('light')" title="Light mode">&#x2600;&#xFE0F;</button>
            <button class="theme-btn" onclick="setTheme('auto')" title="Auto (system)">&#x1F5A5;&#xFE0F;</button>
            <button class="theme-btn" onclick="setTheme('dark')" title="Dark mode">&#x1F319;</button>
        </div>
        <div class="login-card">
            <div class="login-logo">
                <img src="/static/logo-horizontal-dark.svg" alt="initMAX" class="logo-light-theme" style="height: 48px;">
                <img src="/static/logo-horizontal-light.svg" alt="initMAX" class="logo-dark-theme" style="height: 48px;">
            </div>
            <h1 class="login-title">Zabbix MCP Server</h1>

            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}

            <form method="post" action="/login" autocomplete="on">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="Username" required autofocus autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Password" required autocomplete="current-password">
                </div>
                <div class="form-group" style="margin-top: 24px;">
                    <button type="submit" class="btn btn-primary w-full btn-lg">Login</button>
                </div>
            </form>
        </div>
        <div class="login-footer">
            &copy; {{ year }} initMAX s.r.o. All rights reserved.
        </div>
    </div>

    <script>
    function setTheme(mode) {
        localStorage.setItem('theme', mode);
        applyTheme();
    }
    function applyTheme() {
        var saved = localStorage.getItem('theme') || 'auto';
        var resolved;
        if (saved === 'auto') {
            resolved = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        } else {
            resolved = saved;
        }
        document.documentElement.setAttribute('data-theme', resolved);
        // Highlight active button
        document.querySelectorAll('.theme-btn').forEach(function(btn) {
            btn.classList.remove('active');
        });
        var idx = {light: 0, auto: 1, dark: 2}[saved];
        if (idx !== undefined) document.querySelectorAll('.theme-btn')[idx].classList.add('active');
    }
    applyTheme();
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function() {
        if (localStorage.getItem('theme') === 'auto') applyTheme();
    });
    </script>
</body>
</html>
