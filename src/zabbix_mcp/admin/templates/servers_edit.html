{% extends "base.html" %}
{% block title %}Edit Server: {{ edit_server_name }}{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Edit: {{ edit_server_name }}</h1>
        <p class="page-subtitle">Modify Zabbix server connection</p>
    </div>
    <a href="/servers" class="btn btn-ghost">&larr; Back</a>
</div>

<div class="card" style="max-width:640px;">
    <form method="post" action="/servers/{{ edit_server_name }}/edit">
        <div class="form-group">
            <label class="form-label">Zabbix URL</label>
            <input type="url" name="url" class="form-input" value="{{ server.url | default('') }}" required>
        </div>
        <div class="form-group">
            <label class="form-label">API Token</label>
            <input type="text" name="api_token" class="form-input" value="{{ server.api_token | default('') }}" placeholder="Leave empty to keep current">
            <small class="text-muted">Leave empty to keep the current token</small>
        </div>
        <div class="form-group" style="display:flex; gap:24px;">
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                <input type="checkbox" name="read_only" {% if server.read_only %}checked{% endif %}> Read-only
            </label>
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                <input type="checkbox" name="verify_ssl" {% if server.verify_ssl %}checked{% endif %}> Verify SSL
            </label>
        </div>
        <div style="display:flex; gap:8px;">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="/servers" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
